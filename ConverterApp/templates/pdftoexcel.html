<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Excel Converter</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<h1>PDF to Excel Converter</h1>

<div class="container">
    <form action="/upload" method="post" enctype="multipart/form-data" id="uploadForm">

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">&#128196;</div>
            <div class="drop-zone-text">
                Drag & drop PDF files here or <span class="browse-link" id="browseLink">browse</span>
            </div>
            <input type="file" id="pdfFile" name="pdfFile" accept=".pdf" multiple required>
            <div class="file-list" id="fileList"></div>
        </div>

        <p>Select processing option:</p>
        <input type="radio" id="allText" name="processingOption" value="allText" checked>
        <label for="allText">PDF Text + Tables</label>

        <input type="radio" id="tablesOnly" name="processingOption" value="tablesOnly">
        <label for="tablesOnly">Only PDF Tables</label>

        <br>

        <p>Select output format:</p>
        <input type="radio" id="xlsx" name="outputFormat" value="xlsx" checked>
        <label for="xlsx">Excel (.xlsx)</label>

        <input type="radio" id="csv" name="outputFormat" value="csv">
        <label for="csv">CSV (.csv)</label>

        <input type="radio" id="json" name="outputFormat" value="json">
        <label for="json">JSON (.json)</label>

        <br>
        <button type="submit" id="submitButton">Convert</button>

        <!-- Vùng hiển thị lỗi: rỗng/ẩn khi không có lỗi, không ảnh hưởng layout gốc -->
        <div id="errorMsg" style="display:none; color:#c0392b; margin-top:10px;"></div>
    </form>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('pdfFile');
    const browseLink = document.getElementById('browseLink');
    const fileListDiv = document.getElementById('fileList');
    const uploadForm = document.getElementById('uploadForm');
    const submitButton = document.getElementById('submitButton');
    const errorMsgDiv = document.getElementById('errorMsg');

    let selectedFiles = [];

    // Click to browse
    browseLink.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.click();
    });

    dropZone.addEventListener('click', (e) => {
        if (e.target.classList.contains('file-item-remove')) return;
        fileInput.click();
    });

    // Prevent default drag behaviors
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
        });
    });

    // Highlight on drag
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => {
            dropZone.classList.add('dragover');
        });
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => {
            dropZone.classList.remove('dragover');
        });
    });

    // Kiểm tra PDF bằng cả MIME type LẪN đuôi file, vì một số trình duyệt/OS
    // không gán đúng type "application/pdf" khi kéo-thả, dẫn tới file PDF
    // hợp lệ bị lọc bỏ âm thầm mà không có cảnh báo gì.
    function isPdfFile(file) {
        return file.type === 'application/pdf' ||
               file.name.toLowerCase().endsWith('.pdf');
    }

    // Handle drop
    dropZone.addEventListener('drop', (e) => {
        const allDropped = [...e.dataTransfer.files];
        const files = allDropped.filter(isPdfFile);
        const rejectedCount = allDropped.length - files.length;

        if (rejectedCount > 0) {
            showError(`${rejectedCount} file were skipped because they are not PDF files.`);
        }

        addFiles(files);
    });

    // Handle file input change
    fileInput.addEventListener('change', () => {
        addFiles([...fileInput.files]);
    });

    function addFiles(files) {
        clearError();
        files.forEach(file => {
            if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
                selectedFiles.push(file);
            }
        });
        updateFileList();
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        updateFileList();
    }

    function updateFileList() {
        if (selectedFiles.length === 0) {
            fileListDiv.innerHTML = '';
            dropZone.classList.remove('has-file');
            return;
        }

        dropZone.classList.add('has-file');

        fileListDiv.innerHTML = selectedFiles.map((file, index) => `
            <div class="file-item">
                <div class="file-item-info">
                    <span>&#128196;</span>
                    <span class="file-item-name">${file.name}</span>
                    <span class="file-item-size">(${formatFileSize(file.size)})</span>
                </div>
                <button type="button" class="file-item-remove" onclick="removeFile(${index})">&times;</button>
            </div>
        `).join('');

        // Update the file input
        const dt = new DataTransfer();
        selectedFiles.forEach(file => dt.items.add(file));
        fileInput.files = dt.files;
    }

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function showError(message) {
        errorMsgDiv.textContent = message;
        errorMsgDiv.style.display = 'block';
    }

    function clearError() {
        errorMsgDiv.textContent = '';
        errorMsgDiv.style.display = 'none';
    }

    // Lấy tên file gốc từ header Content-Disposition, hỗ trợ cả tên file
    // có dấu tiếng Việt (dạng filename*=UTF-8''...) lẫn tên file ASCII thường.
    function parseFilename(disposition) {
        if (!disposition) return null;
        const utf8Match = disposition.match(/filename\*=UTF-8''([^;]+)/i);
        if (utf8Match) {
            try {
                return decodeURIComponent(utf8Match[1]);
            } catch (e) {
                // fallthrough
            }
        }
        const asciiMatch = disposition.match(/filename="?([^"[;]+)"?/i);
        return asciiMatch ? asciiMatch[1] : null;
    }

    // Submit bằng fetch thay vì để trình duyệt điều hướng trực tiếp:
    // - Thành công: nhận file trả về, tự động tải xuống, KHÔNG rời trang.
    // - Lỗi (400/413/500...): hiện thông báo lỗi ngay trên trang thay vì
    //   trình duyệt bị điều hướng sang một trang JSON trần trụi.
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearError();

        if (selectedFiles.length === 0) {
            showError('Please select at least one PDF.');
            return;
        }

        const originalText = submitButton.textContent;
        submitButton.disabled = true;
        submitButton.textContent = 'Processing...';

        try {
            const formData = new FormData(uploadForm);
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                let message = `Error occured (code ${response.status}). Please try again.`;
                try {
                    const data = await response.json();
                    if (data && data.error) message = data.error;
                } catch (_) {
                    // response không phải JSON, giữ message mặc định
                }
                showError(message);
                return;
            }

            const disposition = response.headers.get('Content-Disposition') || '';
            const filename = parseFilename(disposition) || 'converted_output';

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        } catch (err) {
            showError('Could not connect to server. Please try again.');
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = originalText;
        }
    });

    // Heartbeat mechanism to keep server alive while browser is open
    const HEARTBEAT_INTERVAL = 10000; // 10 seconds

    function sendHeartbeat() {
        fetch('/heartbeat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        }).catch(() => {
            // Server might be shutting down, ignore errors
        });
    }

    // Start heartbeat immediately and repeat every 10 seconds
    sendHeartbeat();
    setInterval(sendHeartbeat, HEARTBEAT_INTERVAL);

    // Note: We rely only on heartbeat timeout for shutdown.
    // beforeunload is not used because it fires on form submit/navigation too.
</script>
</body>
</html>
